{{- define "main" }}

<header class="page-header">
  <h1>Fitness Log</h1>
  <p class="page-description">Daily logs of my diet, workouts, and anything fitness-related. On a journey to be healthier and reach under 25% body fat.</p>
</header>

<ul class="dated-list">
  {{- range .Pages.ByDate.Reverse }}
  <li class="dated-list-item">
    <time class="dated-list-date">{{ .Date.Format "02 Jan 2006" }}</time>
    <a href="{{ .RelPermalink }}" class="dated-list-link">{{ .Title }}</a>
  </li>
  {{- end }}
</ul>

{{- end }}
